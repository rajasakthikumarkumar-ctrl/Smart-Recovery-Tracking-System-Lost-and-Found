<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Lost & Found</title>
  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: linear-gradient(270deg, #74ebd5, #ACB6E5, #89f7fe, #66a6ff);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      background: #fff;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      width: 350px;
      text-align: center;
    }

    h2 {
      color: #2e7d32;
      margin-bottom: 10px;
    }

    input, button {
  width: 100%;
  padding: 12px;
  margin: 10px 0;   /* Same spacing for both */
  border-radius: 8px;
  font-size: 14px;
  outline: none;
  box-sizing: border-box; /* Ensures perfect equal width */
}

/* Input styling */
input {
  border: 2px solid #aee571;
  transition: 0.3s ease;
}

input:focus {
  border-color: #66bb6a;
  box-shadow: 0 0 8px rgba(102, 187, 106, 0.3);
}

/* Button styling */
button {
  border: none;
  background: linear-gradient(90deg, #5b86e5, #36d1dc);
  color: #fff;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s ease;
}

button:hover {
  opacity: 0.9;
  transform: translateY(-1px);
}

    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .bottom-text {
      margin-top: 15px;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
    }

    .bottom-text a {
      color: #2e7d32;
      text-decoration: none;
      font-weight: 600;
    }

    .bottom-text a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Login</h2>
    <form method="POST" action="login.php" id="loginForm">
      <input type="text" id="reg" name="reg" placeholder="Register Number" required>
      <input type="password" id="pass" name="pass" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <div class="bottom-text">
      <a href="signup.html">Sign Up</a>
      <a href="admin_login.html">Admin Login</a>
    </div>
  </div>
</body>
</html>
