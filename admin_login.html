<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Lost & Found</title>
  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: linear-gradient(270deg, #74ebd5, #ACB6E5, #89f7fe, #66a6ff);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      position: relative;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Back Button */
    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      background: #fff;
      color: #2e7d32;
      border: none;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: 0.3s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .back-btn:hover {
      background: #f1f8e9;
      transform: scale(1.05);
    }

    .container {
      background: #fff;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      width: 350px;
      text-align: center;
    }

    h2 {
      color: #2e7d32;
      margin-bottom: 15px;
    }

    /* Equal width inputs & button */
    input, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box; /* Ensures same width */
    }

    input {
      border: 2px solid #aee571;
      outline: none;
      transition: 0.3s ease;
    }

    input:focus {
      border-color: #66bb6a;
      box-shadow: 0 0 8px rgba(102, 187, 106, 0.3);
    }

    button {
      border: none;
      background: linear-gradient(90deg, #5b86e5, #36d1dc);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

  </style>
</head>

<body>

  <a href="login.html" class="back-btn">← Back</a>

  <div class="container">
    <h2>Admin Login</h2>

    <form method="POST" action="admin_login.php" id="adminLoginForm">
      <input type="text" name="user" placeholder="Admin Username" required>
      <input type="password" name="pass" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
  </div>

</body>
</html>
