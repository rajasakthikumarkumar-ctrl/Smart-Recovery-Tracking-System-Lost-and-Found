<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Signup | Lost & Found</title>

  <style>
    body {
      font-family: "Poppins", sans-serif;
      background: linear-gradient(270deg, #74ebd5, #ACB6E5, #89f7fe, #66a6ff);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      background: #fff;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
      width: 380px;
      text-align: center;
    }

    h2 {
      color: #1e3c72;
      margin-bottom: 12px;
      font-weight: 700;
    }

    /* Inputs & button same size */
    input, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }

    input {
      border: 2px solid #b0c4ff;
      outline: none;
      transition: 0.3s ease;
    }

    input:focus {
      border-color: #2a5298;
      box-shadow: 0 0 8px rgba(42, 82, 152, 0.3);
    }

    button {
      border: none;
      background: linear-gradient(90deg, #2a5298, #1e3c72);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s ease;
      margin-top: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .bottom-text {
      margin-top: 15px;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
    }

    .bottom-text a {
      color: #1e3c72;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s ease;
    }

    .bottom-text a:hover {
      text-decoration: underline;
      color: #2a5298;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Student Signup</h2>

    <form method="POST" action="signup.php" id="signupForm">
      <input type="text" name="name" placeholder="Full Name" required>
      <input type="text" name="reg" placeholder="Register Number" required>
      <input type="text" name="mobile" placeholder="Mobile Number" required>
      <input type="text" name="dept" placeholder="Department" required>
      <input type="text" name="year" placeholder="Year" required>

      <input type="password" id="pass" name="pass" placeholder="Password" required>
      <input type="password" id="confirmPass" name="confirmPass" placeholder="Confirm Password" required>

      <button type="submit">Sign Up</button>
    </form>

    <div class="bottom-text">
      <a href="login.html">Login</a>
      <a href="admin_login.html">Admin Login</a>
    </div>
  </div>

  <script src="signup.js"></script>
</body>
</html>
